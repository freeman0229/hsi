<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Hong Kong Stock Market</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Container for the iframe */
        .report-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Loading indicator */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #666;
            z-index: 1;
        }

        /* Mobile Portrait Mode (default) */
        @media screen and (max-width: 768px) and (orientation: portrait) {
            body {
                background-color: #f5f5f5;
            }
            
            .report-container {
                padding: 0;
            }
        }

        /* Mobile Landscape Mode */
        @media screen and (max-width: 1024px) and (orientation: landscape) {
            body {
                background-color: #f5f5f5;
            }
            
            .report-container {
                padding: 0;
            }
            
            /* Ensure full viewport usage in landscape */
            html, body {
                height: 100vh;
                height: -webkit-fill-available;
            }
        }

        /* Tablet adjustments */
        @media screen and (min-width: 768px) and (max-width: 1024px) {
            .report-container {
                padding: 10px;
            }
        }

        /* Handle iOS Safari bottom bar */
        @supports (-webkit-touch-callout: none) {
            body {
                height: -webkit-fill-available;
            }
        }
    </style>
</head>
<body>
    <div class="report-container">
        <div class="loading" id="loading">Loading report...</div>
        <iframe 
            src="https://lookerstudio.google.com/embed/reporting/640665d2-4278-400c-a832-0082c1b743a1/page/p_3fxq1j5b1d" 
            allowfullscreen
            sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
            onload="document.getElementById('loading').style.display='none'">
        </iframe>
    </div>

    <script>
        // Handle viewport height for mobile browsers
        function setViewportHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }

        // Set on load
        setViewportHeight();

        // Update on resize and orientation change
        window.addEventListener('resize', setViewportHeight);
        window.addEventListener('orientationchange', function() {
            setTimeout(setViewportHeight, 100);
        });
    </script>
</body>
</html>
